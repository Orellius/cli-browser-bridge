<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="card">
    <div class="header">
      <img src="icons/icon48.png" alt="logo" class="logo">
      <div>
        <div class="title">CLI Browser Bridge</div>
        <div class="subtitle">by orellius.ai</div>
      </div>
    </div>

    <div class="status-row">
      <span class="dot" id="dot"></span>
      <span class="status-text" id="status">Checking...</span>
    </div>

    <div class="details">
      <div class="detail-row">
        <span class="label">MCP Tabs</span>
        <span class="value" id="tab-count">—</span>
      </div>
      <div class="detail-row">
        <span class="label">Last Activity</span>
        <span class="value" id="last-activity">—</span>
      </div>
      <div class="detail-row">
        <span class="label">Version</span>
        <span class="value">2.0.0</span>
      </div>
    </div>

    <button class="reconnect-btn" id="reconnect">Reconnect</button>
  </div>
  <script src="popup.js"></script>
</body>
</html>
